<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance API - Test Console</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --rh-primary: #1b3a5c;
            --rh-primary-dark: #17314d;
            --rh-accent: #2c5282;
            --rh-bg: #f5f7fa;
            --rh-surface: #ffffff;
            --rh-border: #e2e8f0;
            --rh-text: #1f2937;
            --rh-muted: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--rh-bg);
            color: var(--rh-text);
        }
        .masthead {
            background: linear-gradient(135deg, var(--rh-primary), var(--rh-primary-dark));
            color: #fff;
            border-bottom: 4px solid rgba(255,255,255,0.12);
        }
        .masthead-inner {
            max-width: 860px;
            margin: 0 auto;
            padding: 1rem 1.25rem;
        }
        .masthead h1 {
            font-size: 1.25rem;
            margin-bottom: 0.2rem;
        }
        .masthead .subtitle {
            font-size: 0.9rem;
            opacity: 0.92;
        }
        .container { max-width: 860px; margin: 0 auto; padding: 18px 16px 24px; }
        .quick-links { margin: 0 0 16px; display: flex; gap: 8px; flex-wrap: wrap; }
        .quick-links a {
            display: inline-block;
            font-size: 0.82rem;
            text-decoration: none;
            color: var(--rh-primary);
            background: #eef4fb;
            border: 1px solid #c7d8eb;
            padding: 6px 10px;
            border-radius: 8px;
        }
        .quick-links a:hover { background: #dfeaf7; }
        .status-bar {
            background: var(--rh-surface);
            border: 1px solid var(--rh-border);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(15,23,42,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .status-dot.ok { background: #22c55e; }
        .status-dot.error { background: #ef4444; }
        .status-text { font-size: 0.85rem; color: var(--rh-muted); }
        .chat-box {
            background: var(--rh-surface);
            border: 1px solid var(--rh-border);
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(15,23,42,0.05);
            overflow: hidden;
        }
        .messages { height: 420px; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 16px; }
        .message.user { text-align: right; }
        .message .bubble {
            display: inline-block;
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: left;
            white-space: pre-wrap;
        }
        .message.user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: #edf2f7; color: #111827; border-bottom-left-radius: 4px; white-space: normal; }
        .message.system .bubble { background: #fef3c7; color: #92400e; font-size: 0.85rem; }
        .message.assistant .bubble h1,
        .message.assistant .bubble h2,
        .message.assistant .bubble h3,
        .message.assistant .bubble h4,
        .message.assistant .bubble p,
        .message.assistant .bubble ul,
        .message.assistant .bubble ol,
        .message.assistant .bubble pre,
        .message.assistant .bubble blockquote { margin: 0.45rem 0; }
        .message.assistant .bubble ul,
        .message.assistant .bubble ol { padding-left: 1.2rem; }
        .message.assistant .bubble code { background: #e5e7eb; padding: 0.08rem 0.28rem; border-radius: 4px; font-size: 0.9em; }
        .message.assistant .bubble pre { background: #111827; color: #f9fafb; padding: 0.6rem 0.7rem; border-radius: 6px; overflow: auto; }
        .message.assistant .bubble pre code { background: transparent; padding: 0; color: inherit; }
        .message.assistant .bubble blockquote { border-left: 3px solid #93c5fd; padding-left: 0.6rem; color: #4b5563; }
        .message.assistant .bubble a { color: var(--rh-accent); }
        .input-area { display: flex; border-top: 1px solid var(--rh-border); }
        .input-area input { flex: 1; padding: 14px 18px; border: none; font-size: 1rem; outline: none; }
        .input-area button { padding: 14px 24px; background: #2563eb; color: #fff; border: none; font-size: 1rem; cursor: pointer; font-weight: 500; }
        .input-area button:hover { background: #1d4ed8; }
        .input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
        .meta { font-size: 0.75rem; color: #9ca3af; margin-top: 4px; }
        .info { margin-top: 12px; font-size: 0.8rem; color: var(--rh-muted); }
    </style>
</head>
<body>
    <header class="masthead">
        <div class="masthead-inner">
            <h1>Refuge House Compliance Assistant</h1>
            <p class="subtitle">Test console for the Compliance API</p>
        </div>
    </header>

    <div class="container">
        <div class="quick-links">
            <a href="/site-index">Site Index</a>
            <a href="/public/documents/about" target="_blank" rel="noopener">About</a>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Checking API status...</span>
        </div>

        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="message system">
                    <div class="bubble">Ask any question about Refuge House policies, procedures, or regulations.</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="input" placeholder="e.g. How often does a child need a CANS assessment?" autocomplete="off" />
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <p class="info">This page talks directly to the Compliance API. No API key is needed from this console for testing.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        let history = [];

        // Check health on load
        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                if (data.status === 'ok') {
                    statusDot.className = 'status-dot ok';
                    const docs = data.knowbase?.documentsLoaded || 0;
                    statusText.textContent = `API is running | ${docs} documents loaded | Model: ${data.anthropic?.model || 'unknown'}`;
                } else {
                    throw new Error('Unhealthy');
                }
            } catch (e) {
                statusDot.className = 'status-dot error';
                statusText.textContent = 'API is not responding - check deployment';
            }
        }
        checkHealth();

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        function addMessage(role, text, meta) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            let html = '<div class="bubble">' + escapeHtml(text) + '</div>';
            if (meta) {
                html += '<div class="meta">' + meta + '</div>';
            }
            div.innerHTML = html;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderMarkdown(mdText) {
            if (!mdText) return '';
            if (!window.marked || !window.DOMPurify) {
                return escapeHtml(mdText);
            }

            const rawHtml = window.marked.parse(mdText, {
                gfm: true,
                breaks: true
            });

            return window.DOMPurify.sanitize(rawHtml);
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            inputEl.value = '';
            sendBtn.disabled = true;
            addMessage('user', message);

            // Create an empty assistant bubble that we'll fill with streaming text
            const div = document.createElement('div');
            div.className = 'message assistant';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = '';
            div.appendChild(bubble);
            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta';
            div.appendChild(metaDiv);
            messagesEl.appendChild(div);

            let fullAnswer = '';
            let docCount = '?';
            let responseMs = '?';

            try {
                const res = await fetch('/console/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history })
                });

                if (!res.ok) {
                    const err = await res.json();
                    addMessage('system', 'Error: ' + (err.error || err.message || 'Unknown error'));
                    div.remove();
                    sendBtn.disabled = false;
                    inputEl.focus();
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete line in buffer

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.slice(6);
                        if (payload === '[DONE]') continue;

                        try {
                            const event = JSON.parse(payload);
                            if (event.type === 'text') {
                                fullAnswer += event.data;
                                bubble.textContent = fullAnswer;
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            } else if (event.type === 'meta') {
                                docCount = event.data.documentsInContext || '?';
                            } else if (event.type === 'done') {
                                responseMs = event.data.responseTimeMs || '?';
                            } else if (event.type === 'error') {
                                addMessage('system', 'Error: ' + event.data);
                            }
                        } catch (e) { /* skip malformed lines */ }
                    }
                }

                if (fullAnswer) {
                    bubble.innerHTML = renderMarkdown(fullAnswer);
                }

                metaDiv.textContent = `${docCount} docs referenced | ${responseMs}ms`;
                if (fullAnswer) {
                    history.push({ role: 'user', content: message });
                    history.push({ role: 'assistant', content: fullAnswer });
                }
            } catch (e) {
                addMessage('system', 'Network error: ' + e.message);
                if (!fullAnswer) div.remove();
            }

            sendBtn.disabled = false;
            inputEl.focus();
        }
    </script>
</body>
</html>
